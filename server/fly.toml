# Fly.io app config - Event Sphere Management API
# Deploy from repo root with: cd server && fly deploy
# Or from server/: fly deploy

app = "alishba-api"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
